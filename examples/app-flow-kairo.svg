<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">KAIRO mobile app flow concept</title>
  <desc id="desc">A four-screen mobile app prototype showing capture, triage, route, and resolve states connected by a meaningful flow diagram.</desc>
  <defs>
    <linearGradient id="canvas-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f5f2"/>
      <stop offset="0.55" stop-color="#eef1f7"/>
      <stop offset="1" stop-color="#f7efe8"/>
    </linearGradient>
    <linearGradient id="phone-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f7f4"/>
    </linearGradient>
    <filter id="phone-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1c2527" flood-opacity="0.16"/>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: Consolas, ui-monospace, monospace; letter-spacing: 0; }
      .title { font-size: 46px; font-weight: 820; fill: #172021; }
      .sub { font-size: 18px; fill: #5d6868; }
      .cap { font-size: 12px; font-weight: 760; fill: #dc4a2f; }
      .phone-title { font-size: 22px; font-weight: 800; fill: #172021; }
      .label { font-size: 14px; fill: #576163; }
      .small { font-size: 12px; fill: #687476; }
      .button { font-size: 14px; font-weight: 760; fill: #fffaf4; }
      .status { font-size: 12px; font-weight: 760; fill: #172021; }
    </style>
  </defs>

  <rect id="flow-bg" width="1600" height="980" fill="url(#canvas-bg)"/>
  <g id="header" class="font">
    <text x="70" y="90" class="cap mono">KAIRO / FIELD INCIDENT ROUTING</text>
    <text x="70" y="146" class="title">One issue, four calm decisions.</text>
    <text x="72" y="184" class="sub">The app guides a field team from raw capture to verified resolution without losing state.</text>
  </g>

  <g id="flow-lane">
    <path d="M240 514 C420 368 532 604 720 474 C878 364 1008 460 1136 338 C1288 194 1396 302 1480 236" fill="none" stroke="#202829" stroke-width="18" stroke-linecap="round" opacity="0.08"/>
    <path d="M240 514 C420 368 532 604 720 474 C878 364 1008 460 1136 338 C1288 194 1396 302 1480 236" fill="none" stroke="#1f7f70" stroke-width="5" stroke-linecap="round"/>
    <circle cx="240" cy="514" r="11" fill="#dc4a2f"/>
    <circle cx="720" cy="474" r="11" fill="#d8a31a"/>
    <circle cx="1136" cy="338" r="11" fill="#1f7f70"/>
    <circle cx="1480" cy="236" r="11" fill="#254f8b"/>
  </g>

  <g id="screen-capture" filter="url(#phone-shadow)" class="font">
    <rect x="70" y="238" width="310" height="640" rx="34" fill="#172021"/>
    <rect x="84" y="254" width="282" height="608" rx="25" fill="url(#phone-glass)"/>
    <rect x="176" y="269" width="98" height="6" rx="3" fill="#d8ded7"/>
    <text x="112" y="322" class="cap mono">STEP 01</text>
    <text x="112" y="354" class="phone-title">Capture</text>
    <rect x="112" y="388" width="206" height="154" rx="8" fill="#e4ebe5"/>
    <path d="M136 508 L178 460 L212 492 L244 450 L298 522" fill="none" stroke="#1f7f70" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="154" cy="424" r="20" fill="#fffaf4"/>
    <text x="112" y="586" class="label">Dock door image</text>
    <text x="112" y="612" class="small">2 photos attached</text>
    <rect x="112" y="646" width="206" height="44" rx="8" fill="#172021"/>
    <text x="165" y="674" class="button">Add context</text>
    <rect x="112" y="716" width="206" height="60" rx="8" fill="#fffaf4" stroke="#dfe5de"/>
    <text x="130" y="741" class="status">Voice note</text>
    <text x="130" y="763" class="small">"Inbound pallets blocked"</text>
  </g>

  <g id="screen-triage" filter="url(#phone-shadow)" class="font">
    <rect x="450" y="238" width="310" height="640" rx="34" fill="#172021"/>
    <rect x="464" y="254" width="282" height="608" rx="25" fill="url(#phone-glass)"/>
    <rect x="556" y="269" width="98" height="6" rx="3" fill="#d8ded7"/>
    <text x="492" y="322" class="cap mono">STEP 02</text>
    <text x="492" y="354" class="phone-title">Triage</text>
    <rect x="492" y="388" width="206" height="74" rx="8" fill="#172021"/>
    <text x="512" y="418" font-size="17" font-weight="780" fill="#fffaf4">Priority: high</text>
    <text x="512" y="443" class="small" fill="#cdd6d0">SLA impact in 42 min</text>
    <g id="triage-bars">
      <rect x="492" y="500" width="206" height="9" rx="4" fill="#e2e7e2"/>
      <rect x="492" y="500" width="164" height="9" rx="4" fill="#dc4a2f"/>
      <rect x="492" y="548" width="206" height="9" rx="4" fill="#e2e7e2"/>
      <rect x="492" y="548" width="128" height="9" rx="4" fill="#d8a31a"/>
      <rect x="492" y="596" width="206" height="9" rx="4" fill="#e2e7e2"/>
      <rect x="492" y="596" width="82" height="9" rx="4" fill="#1f7f70"/>
    </g>
    <text x="492" y="489" class="label">Impact confidence</text>
    <text x="492" y="537" class="label">Crew availability</text>
    <text x="492" y="585" class="label">Parts risk</text>
    <rect x="492" y="662" width="206" height="86" rx="8" fill="#fffaf4" stroke="#dfe5de"/>
    <text x="512" y="694" class="status">Suggested route</text>
    <text x="512" y="721" class="small">Send to dock lead and inventory.</text>
  </g>

  <g id="screen-route" filter="url(#phone-shadow)" class="font">
    <rect x="830" y="238" width="310" height="640" rx="34" fill="#172021"/>
    <rect x="844" y="254" width="282" height="608" rx="25" fill="url(#phone-glass)"/>
    <rect x="936" y="269" width="98" height="6" rx="3" fill="#d8ded7"/>
    <text x="872" y="322" class="cap mono">STEP 03</text>
    <text x="872" y="354" class="phone-title">Route</text>
    <g id="route-map">
      <path d="M920 472 C972 418 1026 508 1078 442" fill="none" stroke="#1f7f70" stroke-width="5" stroke-linecap="round"/>
      <circle cx="920" cy="472" r="30" fill="#fffaf4" stroke="#dc4a2f" stroke-width="4"/>
      <circle cx="1002" cy="468" r="26" fill="#fffaf4" stroke="#d8a31a" stroke-width="4"/>
      <circle cx="1078" cy="442" r="30" fill="#fffaf4" stroke="#1f7f70" stroke-width="4"/>
      <text x="902" y="477" class="status">Ops</text>
      <text x="982" y="473" class="status">Inv</text>
      <text x="1057" y="447" class="status">Dock</text>
    </g>
    <rect x="872" y="548" width="206" height="48" rx="8" fill="#172021"/>
    <text x="928" y="578" class="button">Assign now</text>
    <rect x="872" y="626" width="206" height="48" rx="8" fill="#eef2ef" stroke="#dfe5de"/>
    <text x="915" y="656" class="status">Schedule later</text>
    <text x="872" y="724" class="label">Current owner</text>
    <text x="872" y="756" font-size="28" font-weight="820" fill="#172021">Mina R.</text>
  </g>

  <g id="screen-resolve" filter="url(#phone-shadow)" class="font">
    <rect x="1210" y="238" width="310" height="640" rx="34" fill="#172021"/>
    <rect x="1224" y="254" width="282" height="608" rx="25" fill="url(#phone-glass)"/>
    <rect x="1316" y="269" width="98" height="6" rx="3" fill="#d8ded7"/>
    <text x="1252" y="322" class="cap mono">STEP 04</text>
    <text x="1252" y="354" class="phone-title">Resolve</text>
    <circle cx="1365" cy="472" r="86" fill="#eaf3ee"/>
    <path d="M1328 472 L1353 498 L1404 438" fill="none" stroke="#1f7f70" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1294" y="604" font-size="34" font-weight="840" fill="#172021">Verified</text>
    <text x="1286" y="636" class="label">Dock B reopened at 14:18</text>
    <rect x="1252" y="682" width="206" height="54" rx="8" fill="#172021"/>
    <text x="1310" y="716" class="button">Close issue</text>
    <text x="1282" y="780" class="small">Undo available for 10 min</text>
  </g>

  <g id="bottom-review" class="font">
    <rect x="70" y="910" width="1450" height="1" fill="#cad2ce"/>
    <text x="70" y="944" class="small">Rubric target: 90/100. The SVG lane explains state progression; phone controls remain recognizable and task-oriented.</text>
  </g>
</svg>
