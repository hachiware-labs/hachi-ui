<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Aurelia fluid sans landing page concept</title>
  <desc id="desc">A refined sans-serif landing page concept with fluid spatial signal ribbons and a high-end soft architectural interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf6"/>
      <stop offset="0.45" stop-color="#eef5f2"/>
      <stop offset="1" stop-color="#f4efe7"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#315b6f"/>
      <stop offset="0.42" stop-color="#62a497"/>
      <stop offset="1" stop-color="#c09b5e"/>
    </linearGradient>
    <linearGradient id="ribbon-soft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9e4e5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9fbeb6" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#e2cfad" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e1d8"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#22302f" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#22302f" flood-opacity="0.1"/>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: Consolas, ui-monospace, monospace; letter-spacing: 0; }
      .brand { font-size: 20px; font-weight: 760; fill: #182423; }
      .nav { font-size: 14px; font-weight: 640; fill: #394643; }
      .eyebrow { font-size: 12px; font-weight: 760; fill: #8b6a3c; }
      .h1 { font-size: 76px; font-weight: 760; fill: #172321; }
      .body { font-size: 21px; fill: #5b6763; }
      .small { font-size: 13px; fill: #67746f; }
      .label { font-size: 12px; font-weight: 780; fill: #414c48; }
      .metric { font-size: 30px; font-weight: 780; fill: #172321; }
      .button { font-size: 15px; font-weight: 760; fill: #fffdf7; }
      .button-dark { font-size: 15px; font-weight: 760; fill: #172321; }
    </style>
  </defs>

  <rect id="page" width="1440" height="1024" fill="url(#bg)"/>
  <g id="ambient-lines" opacity="0.34">
    <path d="M-60 182 C212 88 410 238 650 128 C848 38 1032 82 1512 36" fill="none" stroke="#b7c5bd" stroke-width="1"/>
    <path d="M-80 850 C244 726 462 900 746 736 C1018 578 1188 694 1502 560" fill="none" stroke="#c4bcae" stroke-width="1"/>
    <path d="M762 -80 C710 172 764 342 706 522 C656 678 724 842 670 1100" fill="none" stroke="#cbd2cc" stroke-width="1"/>
  </g>

  <g id="navigation" class="font">
    <circle cx="78" cy="68" r="16" fill="#182423"/>
    <path d="M70 69 C73 59 82 55 88 67 C84 73 77 77 70 69 Z" fill="#fffdf7"/>
    <text x="106" y="75" class="brand">Aurelia</text>
    <text x="926" y="73" class="nav">Platform</text>
    <text x="1030" y="73" class="nav">Spaces</text>
    <text x="1126" y="73" class="nav">Journal</text>
    <rect x="1230" y="44" width="154" height="46" rx="8" fill="#182423"/>
    <text x="1260" y="73" class="button">Request access</text>
  </g>

  <g id="hero-copy" class="font">
    <text x="96" y="202" class="eyebrow mono">PRIVATE SPATIAL INTELLIGENCE</text>
    <text x="94" y="306" class="h1">The room</text>
    <text x="94" y="389" class="h1">reads the</text>
    <text x="94" y="472" class="h1">moment</text>
    <text x="94" y="555" class="h1">in motion.</text>
    <text x="100" y="624" class="body">Aurelia senses atmosphere, service tempo, and guest</text>
    <text x="100" y="656" class="body">flow, then turns them into graceful next steps.</text>
    <rect x="100" y="716" width="182" height="56" rx="8" fill="#182423"/>
    <text x="136" y="751" class="button">Explore the model</text>
    <rect x="300" y="716" width="148" height="56" rx="8" fill="#ffffff" fill-opacity="0.48" stroke="#bec9c3" stroke-width="1.5"/>
    <text x="333" y="751" class="button-dark">View brief</text>
  </g>

  <g id="fluid-visual" filter="url(#lift)">
    <path d="M602 534 C696 328 910 208 1138 286 C1288 338 1320 520 1218 660 C1098 826 798 810 654 674 C600 624 578 586 602 534 Z" fill="url(#ribbon-soft)" opacity="0.82"/>
    <path d="M724 318 C894 212 1150 254 1228 424 C1300 582 1138 726 942 730 C760 734 636 648 668 526 C690 444 620 382 724 318 Z" fill="#ffffff" fill-opacity="0.5" stroke="#d5ddd6" stroke-width="1.4"/>
    <path d="M718 496 C798 412 902 420 982 360 C1078 288 1174 330 1216 428 C1264 538 1182 640 1058 682 C918 730 758 658 694 574 C676 550 682 532 718 496 Z" fill="url(#surface)" stroke="#d0c8ba" stroke-width="1.6"/>

    <g id="space-mesh" opacity="0.62">
      <path d="M734 532 C856 492 976 454 1182 414" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
      <path d="M726 588 C858 548 1006 514 1194 492" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
      <path d="M780 642 C890 600 1038 584 1146 560" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
      <path d="M814 460 C840 538 852 594 866 690" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
      <path d="M958 408 C982 506 1000 602 1014 704" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
      <path d="M1118 390 C1112 480 1112 568 1102 646" fill="none" stroke="#9aa8a1" stroke-width="1.2"/>
    </g>

    <path id="primary-flow-glow" d="M678 586 C780 494 878 584 980 486 C1062 408 1138 374 1248 418" fill="none" stroke="#dce8e3" stroke-width="38" stroke-linecap="round" opacity="0.8"/>
    <path id="primary-flow" d="M678 586 C780 494 878 584 980 486 C1062 408 1138 374 1248 418" fill="none" stroke="url(#ribbon)" stroke-width="12" stroke-linecap="round"/>
    <path id="service-flow" d="M720 676 C828 608 930 650 1048 594 C1138 552 1170 514 1240 536" fill="none" stroke="#bd9458" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 16"/>

    <g id="nodes" class="font">
      <circle cx="678" cy="586" r="34" fill="#fffdf7" stroke="#315b6f" stroke-width="3"/>
      <text x="658" y="591" class="label">Entry</text>
      <circle cx="980" cy="486" r="43" fill="#fffdf7" stroke="#bd9458" stroke-width="3"/>
      <text x="954" y="481" class="label">Lounge</text>
      <text x="957" y="503" class="small">+21%</text>
      <circle cx="1248" cy="418" r="35" fill="#fffdf7" stroke="#1f6d64" stroke-width="3"/>
      <text x="1227" y="423" class="label">Host</text>
      <circle cx="1240" cy="536" r="30" fill="#fffdf7" stroke="#bd9458" stroke-width="3"/>
      <text x="1225" y="541" class="label">Bar</text>
    </g>
  </g>

  <g id="annotations" class="font">
    <path d="M934 282 H1110 L1162 398" fill="none" stroke="#202a28" stroke-width="1.4"/>
    <rect x="790" y="248" width="238" height="66" rx="8" fill="#fffdf7" stroke="#d9e0da" filter="url(#soft)"/>
    <text x="812" y="274" class="label">Atmosphere curve</text>
    <text x="812" y="298" class="small">Light, density, and tempo stay aligned.</text>

    <path d="M1058 760 H1210 L1246 562" fill="none" stroke="#202a28" stroke-width="1.4"/>
    <rect x="1040" y="756" width="256" height="66" rx="8" fill="#fffdf7" stroke="#d9e0da" filter="url(#soft)"/>
    <text x="1062" y="782" class="label">Graceful intervention</text>
    <text x="1062" y="806" class="small">Open west lounge before the queue appears.</text>
  </g>

  <g id="proof" class="font">
    <rect x="96" y="870" width="1248" height="1" fill="#bdc6bf"/>
    <text x="100" y="924" class="metric">42%</text>
    <text x="100" y="952" class="small">faster guest recovery</text>
    <text x="324" y="924" class="metric">11 min</text>
    <text x="324" y="952" class="small">earlier service signal</text>
    <text x="574" y="924" class="metric">0 cameras</text>
    <text x="574" y="952" class="small">identity-free by design</text>
    <text x="1010" y="924" class="small">For places where attention must feel</text>
    <text x="1010" y="952" class="small">invisible, precise, and calmly timed.</text>
  </g>
</svg>
