<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">NORIBA landing page concept</title>
  <desc id="desc">A visually led landing page prototype for an operations intelligence product with a full-canvas route diagram and clear conversion path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f1e6"/>
      <stop offset="0.48" stop-color="#eef4ec"/>
      <stop offset="1" stop-color="#e9eef6"/>
    </linearGradient>
    <linearGradient id="flow-a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d7472f"/>
      <stop offset="0.48" stop-color="#1f8a70"/>
      <stop offset="1" stop-color="#1e4e8c"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#243026" flood-opacity="0.15"/>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .label { font-size: 15px; fill: #2b302c; }
      .muted { fill: #687169; }
      .tiny { font-size: 12px; letter-spacing: 0; }
      .small { font-size: 14px; letter-spacing: 0; }
      .body { font-size: 22px; line-height: 1.3; letter-spacing: 0; }
      .h1 { font-size: 92px; font-weight: 800; letter-spacing: 0; fill: #1f241f; }
      .h2 { font-size: 30px; font-weight: 760; letter-spacing: 0; fill: #222923; }
      .nav { font-size: 15px; font-weight: 680; letter-spacing: 0; fill: #333b35; }
      .button-text { font-size: 17px; font-weight: 760; letter-spacing: 0; }
      .metric { font-size: 34px; font-weight: 780; letter-spacing: 0; fill: #1f241f; }
      .light { fill: #fff8ee; }
      .light-muted { fill: #c9d1c8; }
      .mono { font-family: Consolas, ui-monospace, monospace; }
    </style>
  </defs>

  <rect id="page-bg" width="1440" height="1024" fill="url(#bg)"/>
  <g id="texture" opacity="0.18">
    <path d="M-40 185 C210 98 420 250 640 148 C890 32 1102 142 1492 72" fill="none" stroke="#213127" stroke-width="1"/>
    <path d="M-20 900 C220 780 448 940 690 808 C940 672 1160 750 1500 642" fill="none" stroke="#213127" stroke-width="1"/>
    <path d="M1250 -40 C1168 180 1265 345 1130 520 C1010 674 1090 792 990 1080" fill="none" stroke="#213127" stroke-width="1"/>
  </g>

  <g id="top-nav" class="font">
    <text x="82" y="76" class="nav" font-size="24" font-weight="820">NORIBA</text>
    <circle cx="65" cy="69" r="11" fill="#d7472f"/>
    <circle cx="65" cy="69" r="4" fill="#f7f1e6"/>
    <text x="1002" y="74" class="nav">Use cases</text>
    <text x="1112" y="74" class="nav">Signal map</text>
    <text x="1238" y="74" class="nav">Pricing</text>
    <rect x="1316" y="46" width="84" height="42" rx="8" fill="#1f241f"/>
    <text x="1338" y="73" class="font" font-size="15" font-weight="760" fill="#fff8ee">Demo</text>
  </g>

  <g id="hero-copy" class="font">
    <text x="82" y="205" class="tiny mono" fill="#d7472f" font-weight="760">OPERATIONS INTELLIGENCE / LIVE BOTTLENECK MAP</text>
    <text x="80" y="315" class="h1">Find the</text>
    <text x="80" y="408" class="h1">constraint</text>
    <text x="80" y="501" class="h1">before it</text>
    <text x="80" y="594" class="h1">finds you.</text>
    <text x="86" y="652" class="body" fill="#424b43">NORIBA turns scattered operations signals</text>
    <text x="86" y="684" class="body" fill="#424b43">into one live map for teams under pressure.</text>

    <rect x="84" y="732" width="178" height="58" rx="8" fill="#d7472f"/>
    <text x="118" y="768" class="button-text" fill="#fffaf2">Map my flow</text>
    <rect x="280" y="732" width="186" height="58" rx="8" fill="none" stroke="#1f241f" stroke-width="2"/>
    <text x="314" y="768" class="button-text" fill="#1f241f">View sample</text>
  </g>

  <g id="signal-map" filter="url(#soft-shadow)">
    <path id="main-route" d="M614 668 C708 522 665 378 822 276 C955 190 1080 256 1131 390 C1172 498 1102 590 1198 694 C1260 762 1340 732 1398 640" fill="none" stroke="#202820" stroke-width="34" stroke-linecap="round" opacity="0.12"/>
    <path id="main-route-color" d="M614 668 C708 522 665 378 822 276 C955 190 1080 256 1131 390 C1172 498 1102 590 1198 694 C1260 762 1340 732 1398 640" fill="none" stroke="url(#flow-a)" stroke-width="12" stroke-linecap="round"/>
    <path id="delayed-route" d="M760 737 C862 640 880 556 1008 522 C1126 490 1196 532 1302 470" fill="none" stroke="#d8a31a" stroke-width="8" stroke-linecap="round" stroke-dasharray="20 18"/>

    <g id="node-intake" class="font">
      <circle cx="614" cy="668" r="58" fill="#fffaf2" stroke="#d7472f" stroke-width="5"/>
      <text x="575" y="660" class="small" font-weight="800" fill="#1f241f">Intake</text>
      <text x="570" y="682" class="tiny muted">642 signals</text>
    </g>
    <g id="node-triage" class="font">
      <circle cx="822" cy="276" r="48" fill="#fffaf2" stroke="#1f8a70" stroke-width="5"/>
      <text x="790" y="273" class="small" font-weight="800" fill="#1f241f">Triage</text>
      <text x="790" y="295" class="tiny muted">7 min lag</text>
    </g>
    <g id="node-risk" class="font">
      <circle cx="1131" cy="390" r="70" fill="#fffaf2" stroke="#d7472f" stroke-width="6"/>
      <circle cx="1131" cy="390" r="85" fill="none" stroke="#d7472f" stroke-width="2" opacity="0.4"/>
      <text x="1093" y="381" class="small" font-weight="840" fill="#1f241f">Constraint</text>
      <text x="1087" y="407" class="tiny muted">Dock B / 31 cases</text>
    </g>
    <g id="node-release" class="font">
      <circle cx="1198" cy="694" r="52" fill="#fffaf2" stroke="#1e4e8c" stroke-width="5"/>
      <text x="1163" y="688" class="small" font-weight="800" fill="#1f241f">Release</text>
      <text x="1164" y="710" class="tiny muted">ETA 14:20</text>
    </g>
  </g>

  <g id="map-annotations" class="font">
    <path d="M955 200 L1024 200 L1080 312" fill="none" stroke="#1f241f" stroke-width="2"/>
    <text x="850" y="193" class="small" fill="#1f241f" font-weight="760">A constraint is not a chart spike.</text>
    <text x="850" y="216" class="small muted">It is the place where work stops moving.</text>

    <path d="M1242 568 L1320 568 L1357 506" fill="none" stroke="#1f241f" stroke-width="2"/>
    <text x="1225" y="598" class="small" fill="#1f241f" font-weight="760">Suggested action</text>
    <text x="1225" y="621" class="small muted">Shift two handlers from C to B.</text>
  </g>

  <g id="proof-band" class="font">
    <rect x="0" y="872" width="1440" height="152" fill="#1f241f"/>
    <text x="82" y="932" class="tiny mono" fill="#d8a31a" font-weight="760">LIVE PROOF</text>
    <text x="82" y="974" class="h2 light">A decision map beats another dashboard.</text>
    <g id="proof-metrics">
      <text x="720" y="936" class="metric light">31%</text>
      <text x="720" y="968" class="small light-muted">fewer stalled handoffs</text>
      <text x="940" y="936" class="metric light">18 min</text>
      <text x="940" y="968" class="small light-muted">earlier exception detection</text>
      <text x="1195" y="936" class="metric light">4.2x</text>
      <text x="1195" y="968" class="small light-muted">faster escalation path</text>
    </g>
  </g>
</svg>
