<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="760" viewBox="0 0 2400 760" role="img" aria-labelledby="title desc">
  <title id="title">Briefwell 初期設定ワイヤーフレーム</title>
  <desc id="desc">会議インテリジェンスサービスの横長モノクロワイヤーフレーム。画面契約を各画面の外側に置き、空状態、ソース連携、検証、最初の有用画面へ左から右に遷移する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      .font { font-family: Inter, "Yu Gothic", Meiryo, "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: Consolas, ui-monospace, monospace; letter-spacing: 0; }
      .title { font-size: 30px; font-weight: 760; fill: #111; }
      .subtitle { font-size: 15px; fill: #555; }
      .frame-title { font-size: 17px; font-weight: 740; fill: #111; }
      .label { font-size: 12px; font-weight: 720; fill: #333; }
      .small { font-size: 12px; fill: #555; }
      .tiny { font-size: 10px; fill: #666; }
      .button { font-size: 12px; font-weight: 720; fill: #fff; }
      .button-light { font-size: 12px; font-weight: 720; fill: #111; }
      .contract-title { font-size: 10px; font-weight: 760; fill: #555; }
      .contract { font-size: 11px; fill: #333; }
      .arrow-label { font-size: 11px; font-weight: 720; fill: #222; }
    </style>
  </defs>

  <rect id="canvas" width="2400" height="760" fill="#f6f6f6"/>

  <g id="overview" class="font">
    <text x="56" y="62" class="title">Briefwell 初期設定ワイヤーフレーム</text>
    <text x="56" y="91" class="subtitle">想定サービス: 会議情報から役員会議向けブリーフを作るSaaS。目標: 5分以内に最初の有用画面へ到達。</text>
    <rect x="2046" y="42" width="296" height="58" rx="6" fill="#fff" stroke="#bbb"/>
    <text x="2066" y="66" class="label">画面パターン</text>
    <text x="2066" y="88" class="small">左から右の初期設定フロー</text>
  </g>

  <g id="screen-contracts" class="font">
    <g id="contract-empty">
      <rect x="56" y="126" width="500" height="58" rx="6" fill="#fff" stroke="#bdbdbd"/>
      <text x="76" y="148" class="contract-title mono">SCREEN 01 CONTRACT</text>
      <text x="76" y="168" class="contract">問い: 最初に何をすればよいか？</text>
      <text x="292" y="168" class="contract">主操作: 連携する / 退避: スキップ</text>
    </g>
    <g id="contract-connect">
      <rect x="652" y="126" width="500" height="58" rx="6" fill="#fff" stroke="#bdbdbd"/>
      <text x="672" y="148" class="contract-title mono">SCREEN 02 CONTRACT</text>
      <text x="672" y="168" class="contract">問い: どの情報ソースが必要か？</text>
      <text x="902" y="168" class="contract">主操作: 次へ / 失敗: OAuth拒否</text>
    </g>
    <g id="contract-validate">
      <rect x="1248" y="126" width="500" height="58" rx="6" fill="#fff" stroke="#bdbdbd"/>
      <text x="1268" y="148" class="contract-title mono">SCREEN 03 CONTRACT</text>
      <text x="1268" y="168" class="contract">問い: 何が生成を止めているか？</text>
      <text x="1508" y="168" class="contract">主操作: 役割を修正 / 退避: 戻る</text>
    </g>
    <g id="contract-first-useful">
      <rect x="1844" y="126" width="500" height="58" rx="6" fill="#fff" stroke="#bdbdbd"/>
      <text x="1864" y="148" class="contract-title mono">SCREEN 04 CONTRACT</text>
      <text x="1864" y="168" class="contract">問い: 何が準備できたか？</text>
      <text x="2070" y="168" class="contract">主操作: ブリーフ確認 / 副操作: 連携を編集</text>
    </g>
  </g>

  <g id="screen-empty" class="font">
    <rect x="56" y="210" width="500" height="390" rx="8" fill="#fff" stroke="#999"/>
    <rect x="80" y="234" width="452" height="48" rx="4" fill="#f1f1f1" stroke="#ccc"/>
    <circle cx="106" cy="258" r="10" fill="#111"/>
    <text x="126" y="263" class="label">Briefwell</text>
    <text x="426" y="263" class="small">ヘルプ</text>
    <text x="480" y="263" class="small">スキップ</text>

    <text x="100" y="326" class="frame-title">最初の役員会議ブリーフを作成</text>
    <text x="100" y="356" class="small">有用なブリーフを作るには、会議情報の連携が必要です。</text>

    <rect x="100" y="394" width="172" height="58" rx="6" fill="#111"/>
    <text x="142" y="428" class="button">連携する</text>
    <rect x="288" y="394" width="140" height="58" rx="6" fill="#fff" stroke="#999"/>
    <text x="328" y="428" class="button-light">サンプルを見る</text>

    <rect x="100" y="486" width="400" height="58" rx="6" fill="#fafafa" stroke="#ccc"/>
    <text x="118" y="510" class="label">空状態</text>
    <text x="118" y="532" class="small">まだブリーフはありません。推奨アクションだけを見せます。</text>
  </g>

  <g id="screen-connect" class="font">
    <rect x="652" y="210" width="500" height="390" rx="8" fill="#fff" stroke="#999"/>
    <rect x="676" y="234" width="452" height="48" rx="4" fill="#f1f1f1" stroke="#ccc"/>
    <text x="698" y="263" class="label">ステップ 1 / 3</text>
    <rect x="938" y="248" width="96" height="20" rx="10" fill="#ddd"/>
    <rect x="938" y="248" width="32" height="20" rx="10" fill="#111"/>
    <text x="1062" y="263" class="small">キャンセル</text>

    <text x="696" y="326" class="frame-title">会議ソースを連携</text>
    <text x="696" y="356" class="small">最初のブリーフに必要なものだけを選びます。</text>

    <rect x="696" y="388" width="412" height="50" rx="6" fill="#f8f8f8" stroke="#aaa"/>
    <rect x="716" y="404" width="18" height="18" rx="2" fill="#111"/>
    <text x="752" y="420" class="label">Google カレンダー</text>
    <text x="1000" y="420" class="small">必須</text>

    <rect x="696" y="450" width="412" height="50" rx="6" fill="#fff" stroke="#aaa"/>
    <rect x="716" y="466" width="18" height="18" rx="2" fill="#fff" stroke="#777"/>
    <text x="752" y="482" class="label">ワークスペース文書</text>
    <text x="1000" y="482" class="small">推奨</text>

    <rect x="784" y="522" width="108" height="34" rx="6" fill="#fff" stroke="#999"/>
    <text x="818" y="544" class="button-light">戻る</text>
    <rect x="904" y="522" width="204" height="34" rx="6" fill="#111"/>
    <text x="986" y="544" class="button">次へ</text>
  </g>

  <g id="screen-validate" class="font">
    <rect x="1248" y="210" width="500" height="390" rx="8" fill="#fff" stroke="#999"/>
    <rect x="1272" y="234" width="452" height="48" rx="4" fill="#f1f1f1" stroke="#ccc"/>
    <text x="1294" y="263" class="label">ステップ 2 / 3</text>
    <rect x="1534" y="248" width="96" height="20" rx="10" fill="#ddd"/>
    <rect x="1534" y="248" width="64" height="20" rx="10" fill="#111"/>
    <text x="1658" y="263" class="small">キャンセル</text>

    <text x="1292" y="326" class="frame-title">検出内容を確認</text>
    <text x="1292" y="356" class="small">生成前に、ブロック要因を解消します。</text>

    <rect x="1292" y="388" width="196" height="62" rx="6" fill="#fff" stroke="#999"/>
    <text x="1312" y="414" class="label">カレンダー権限</text>
    <text x="1312" y="436" class="small">24件の会議を検出</text>
    <rect x="1502" y="388" width="202" height="62" rx="6" fill="#f5f5f5" stroke="#999"/>
    <text x="1522" y="414" class="label">担当者マッピング</text>
    <text x="1522" y="436" class="small">2名の役割が未設定</text>

    <rect x="1292" y="470" width="412" height="34" rx="6" fill="#f6f6f6" stroke="#bbb"/>
    <text x="1312" y="492" class="small">エラー状態: 役割未設定のため生成できません。</text>

    <rect x="1400" y="522" width="108" height="34" rx="6" fill="#fff" stroke="#999"/>
    <text x="1434" y="544" class="button-light">戻る</text>
    <rect x="1520" y="522" width="184" height="34" rx="6" fill="#111"/>
    <text x="1574" y="544" class="button">役割を修正</text>
  </g>

  <g id="screen-first-useful" class="font">
    <rect x="1844" y="210" width="500" height="390" rx="8" fill="#fff" stroke="#999"/>
    <rect x="1868" y="234" width="452" height="48" rx="4" fill="#f1f1f1" stroke="#ccc"/>
    <text x="1890" y="263" class="label">役員会議ブリーフ</text>
    <text x="2170" y="263" class="small">今日</text>
    <rect x="2226" y="246" width="70" height="24" rx="4" fill="#111"/>
    <text x="2244" y="263" class="button">共有</text>

    <text x="1888" y="326" class="frame-title">月曜の役員会議ブリーフが準備できました</text>
    <text x="1888" y="356" class="small">24件の会議、8件のメモ、6名の担当者から生成。</text>

    <rect x="1888" y="388" width="196" height="62" rx="6" fill="#f7f7f7" stroke="#bbb"/>
    <text x="1908" y="414" class="label">判断が必要</text>
    <text x="1908" y="436" class="small">未解決事項が3件</text>
    <rect x="2100" y="388" width="196" height="62" rx="6" fill="#f7f7f7" stroke="#bbb"/>
    <text x="2120" y="414" class="label">リスク信号</text>
    <text x="2120" y="436" class="small">2名の担当者が未更新</text>

    <rect x="1888" y="496" width="154" height="40" rx="6" fill="#111"/>
    <text x="1918" y="521" class="button">ブリーフ確認</text>
    <rect x="2058" y="496" width="148" height="40" rx="6" fill="#fff" stroke="#999"/>
    <text x="2088" y="521" class="button-light">連携を編集</text>
  </g>

  <g id="flow-arrows" class="font" opacity="0.96">
    <path d="M556 405 L650 405" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="562" y="364" width="120" height="30" rx="6" fill="#fff" stroke="#aaa"/>
    <text x="578" y="384" class="arrow-label">連携する</text>

    <path d="M1152 405 L1246 405" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="1150" y="364" width="126" height="30" rx="6" fill="#fff" stroke="#aaa"/>
    <text x="1166" y="384" class="arrow-label">次へ / OAuth成功</text>

    <path d="M1748 405 L1842 405" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="1734" y="364" width="154" height="30" rx="6" fill="#fff" stroke="#aaa"/>
    <text x="1750" y="384" class="arrow-label">役割修正 / 生成完了</text>
  </g>
</svg>
