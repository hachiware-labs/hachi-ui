<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Briefwell Verdant Boardroom - 高品位デザインシステム検証</title>
  <desc id="desc">深いティールのデスクマットと浮いた会議帳票を主役にした、Briefwellの高忠実度SVGテスト。</desc>
  <defs>
    <style>
      .ui { font-family: Inter, "Yu Gothic", Meiryo, "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .display { font-family: "Yu Mincho", "Hiragino Mincho ProN", Georgia, serif; letter-spacing: 0; }
      .mono { font-family: "IBM Plex Mono", Consolas, ui-monospace, monospace; letter-spacing: 0; }
      .hero { font-size: 34px; font-weight: 600; fill: #FFFFFF; }
      .hero-sub { font-size: 14px; fill: #DCEFEA; }
      .title-dark { font-size: 24px; font-weight: 600; fill: #0E2F2D; }
      .h2 { font-size: 20px; font-weight: 720; fill: #0E2F2D; }
      .h3 { font-size: 15px; font-weight: 720; fill: #263C39; }
      .body { font-size: 14px; font-weight: 400; fill: #0E2F2D; }
      .muted { font-size: 13px; font-weight: 400; fill: #637672; }
      .label { font-size: 11px; font-weight: 720; fill: #637672; }
      .label-light { font-size: 11px; font-weight: 720; fill: #DCEFEA; }
      .data { font-size: 12px; font-weight: 500; fill: #637672; }
      .data-light { font-size: 12px; font-weight: 500; fill: #DCEFEA; }
      .btn { font-size: 13px; font-weight: 720; fill: #FFFFFF; }
      .btn-dark { font-size: 13px; font-weight: 720; fill: #0E2F2D; }
      .white { font-size: 11px; font-weight: 720; fill: #FFFFFF; }
    </style>
    <filter id="packetShadow" x="-4%" y="-7%" width="108%" height="118%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0E2F2D" flood-opacity="0.16"/>
    </filter>
    <filter id="softLift" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0E2F2D" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect id="page-shell" width="1440" height="1024" fill="#EFF6F3"/>
  <rect id="desk-mat" x="40" y="30" width="1360" height="362" rx="8" fill="#0E2F2D"/>
  <path d="M76 352 H1364" stroke="#0D6F62" stroke-opacity="0.55"/>
  <path d="M100 72 H1340" stroke="#DCEFEA" stroke-opacity="0.12"/>

  <g id="top-bar" class="ui">
    <rect x="72" y="58" width="32" height="32" rx="5" fill="#FFFFFF"/>
    <path d="M79 74 H97 M88 65 V83" stroke="#0D6F62" stroke-width="1.8"/>
    <text x="122" y="79" style="font-size:20px;font-weight:720;fill:#FFFFFF;">Briefwell</text>
    <text x="226" y="79" class="data-light mono">HACHIWARE LABS / FY26 Q3</text>
    <text x="1014" y="79" class="label-light">CAL-24</text>
    <text x="1084" y="79" class="label-light">DOC-8</text>
    <text x="1148" y="79" class="label-light">PEOPLE-6</text>
    <rect x="1236" y="54" width="62" height="36" rx="4" fill="#0E2F2D" stroke="#DCEFEA" stroke-opacity="0.35"/>
    <text x="1253" y="77" class="btn">履歴</text>
    <rect x="1310" y="54" width="66" height="36" rx="4" fill="#FFFFFF"/>
    <text x="1329" y="77" class="btn-dark">共有</text>
  </g>

  <g id="hero" class="ui">
    <text x="80" y="148" class="label-light">READY / MONDAY 09:12 JST</text>
    <text x="80" y="198" class="display hero">月曜の役員会議ブリーフが整いました</text>
    <text x="80" y="232" class="hero-sub">判断、証跡、未解決リスクを、会議前に一枚のボードパケットとして確認します。</text>
    <g id="hero-confidence">
      <rect x="1110" y="142" width="250" height="78" rx="6" fill="#F8FCFA" fill-opacity="0.96"/>
      <rect x="1132" y="164" width="68" height="24" rx="2" fill="#22765F"/>
      <text x="1146" y="181" class="white">準備完了</text>
      <text x="1216" y="174" class="label">CONFIDENCE</text>
      <text x="1216" y="197" class="data mono">0.84 / REVIEWABLE</text>
    </g>
  </g>

  <g id="board-packet" class="ui" filter="url(#packetShadow)">
    <rect x="76" y="274" width="1288" height="604" rx="8" fill="#FFFFFD" stroke="#CBDDD7"/>
    <rect x="76" y="274" width="14" height="604" rx="8" fill="#0D6F62"/>
    <rect x="90" y="274" width="1274" height="58" rx="8" fill="#F8FCFA"/>
    <line x1="90" y1="332" x2="1364" y2="332" stroke="#E4EFEB"/>
    <text x="118" y="309" class="label">BOARD PACKET</text>
    <text x="1218" y="309" class="data mono">generated 09:12 JST</text>

    <g id="packet-title">
      <text x="118" y="384" class="display title-dark">今週の主要論点</text>
      <text x="118" y="414" class="muted">生成文は編集前提。根拠と差分を見ながら、共有可否を判断します。</text>
      <rect x="1124" y="362" width="190" height="42" rx="4" fill="#0E2F2D"/>
      <text x="1163" y="388" class="btn">ブリーフ確認</text>
    </g>

    <g id="decision-cards">
      <rect x="118" y="452" width="374" height="120" rx="6" fill="#CFEAE2" stroke="#0D6F62"/>
      <rect x="118" y="452" width="6" height="120" fill="#0D6F62"/>
      <text x="144" y="484" class="label">P1 / DECISION</text>
      <text x="144" y="518" class="h3">予算承認の前提確認</text>
      <text x="144" y="546" class="muted">CFO確認が終わるまで共有前レビュー。</text>
      <text x="414" y="488" class="data mono">DOC-08</text>

      <rect x="516" y="452" width="374" height="120" rx="6" fill="#FFFFFF" stroke="#E4EFEB"/>
      <rect x="542" y="478" width="58" height="22" rx="2" fill="#65724A"/>
      <text x="554" y="494" class="white">要確認</text>
      <text x="618" y="496" class="h3">担当者マッピング 2件</text>
      <text x="618" y="526" class="muted">役割未設定のまま生成不可。</text>
      <line x1="542" y1="548" x2="864" y2="548" stroke="#E4EFEB"/>

      <rect x="914" y="452" width="374" height="120" rx="6" fill="#FFFFFF" stroke="#E4EFEB"/>
      <rect x="940" y="478" width="58" height="22" rx="2" fill="#365C6B"/>
      <text x="952" y="494" class="white">リスク</text>
      <text x="1016" y="496" class="h3">顧客責任者の変更</text>
      <text x="1016" y="526" class="muted">2社で導入遅延の兆候があります。</text>
      <line x1="940" y1="548" x2="1262" y2="548" stroke="#E4EFEB"/>
    </g>

    <g id="brief-body">
      <rect x="118" y="612" width="774" height="190" rx="6" fill="#FFFFFF" stroke="#CBDDD7"/>
      <rect x="142" y="640" width="72" height="24" rx="2" fill="#DCEFEA"/>
      <text x="155" y="657" class="label" style="fill:#0E2F2D;">EXCERPT</text>
      <text x="142" y="704" class="body">大型案件の条件変更により、月末着地に上下 4.2% の幅があります。</text>
      <text x="142" y="734" class="muted">根拠: 営業会議メモ、CRM更新、財務レビュー注記</text>
      <line x1="142" y1="764" x2="846" y2="764" stroke="#E4EFEB"/>
      <text x="142" y="786" class="data mono">REVIEW PATH / CFO confirmation -> share brief -> undo available</text>

      <rect x="914" y="612" width="374" height="190" rx="6" fill="#F8FCFA" stroke="#CBDDD7"/>
      <text x="940" y="648" class="label">PROVENANCE</text>
      <text x="940" y="682" class="h2">証跡</text>
      <line x1="940" y1="704" x2="1262" y2="704" stroke="#E4EFEB"/>
      <text x="940" y="738" class="data mono">CALENDAR</text>
      <text x="1052" y="738" class="body">24件</text>
      <text x="940" y="768" class="data mono">DOCS</text>
      <text x="1052" y="768" class="body">8件</text>
      <rect x="1166" y="736" width="96" height="26" rx="2" fill="#276B91"/>
      <text x="1187" y="754" class="white">FOCUS</text>
    </g>
  </g>

  <g id="state-strip" class="ui">
    <rect x="76" y="908" width="1288" height="78" rx="8" fill="#F8FCFA" stroke="#CBDDD7"/>
    <text x="108" y="942" class="label">MICROINTERACTION STATES</text>
    <text x="108" y="966" class="muted">rest -> focus -> active -> generating -> ready -> blocked。主要状態を同じティール語彙で確認。</text>
    <rect x="650" y="929" width="94" height="34" rx="4" fill="#FFFFFF" stroke="#CBDDD7"/>
    <text x="682" y="951" class="btn-dark">通常</text>
    <rect x="758" y="929" width="106" height="34" rx="4" fill="#FFFFFF" stroke="#276B91" stroke-width="2"/>
    <text x="790" y="951" class="btn-dark">Focus</text>
    <rect x="878" y="929" width="96" height="34" rx="4" fill="#064D45"/>
    <text x="906" y="951" class="btn">押下</text>
    <rect x="988" y="929" width="110" height="34" rx="4" fill="#0D6F62"/>
    <text x="1016" y="951" class="btn">生成中</text>
    <rect x="1112" y="929" width="96" height="34" rx="4" fill="#22765F"/>
    <text x="1140" y="951" class="btn">完了</text>
    <rect x="1222" y="929" width="96" height="34" rx="4" fill="#365C6B"/>
    <text x="1250" y="951" class="btn">停止</text>
  </g>
</svg>

