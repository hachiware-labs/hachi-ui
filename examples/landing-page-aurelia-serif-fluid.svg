<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Aurelia fluid serif landing page concept</title>
  <desc id="desc">A premium landing page concept with elegant serif typography and fluid SVG ribbons that express spatial awareness and quiet service guidance.</desc>
  <defs>
    <radialGradient id="bg" cx="62%" cy="38%" r="78%">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.5" stop-color="#f2f3ed"/>
      <stop offset="1" stop-color="#e7e2d8"/>
    </radialGradient>
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfaf3" stop-opacity="0.05"/>
      <stop offset="0.48" stop-color="#cadbd4" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#d8c5a2" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#244e62"/>
      <stop offset="0.44" stop-color="#6a9d8e"/>
      <stop offset="1" stop-color="#b99459"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfb37d"/>
      <stop offset="1" stop-color="#9b7443"/>
    </linearGradient>
    <filter id="deep-lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#26302c" flood-opacity="0.15"/>
    </filter>
    <filter id="label-lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#26302c" flood-opacity="0.1"/>
    </filter>
    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .serif { font-family: Georgia, Times New Roman, serif; letter-spacing: 0; }
      .mono { font-family: Consolas, ui-monospace, monospace; letter-spacing: 0; }
      .brand { font-size: 20px; font-weight: 760; fill: #20231f; }
      .nav { font-size: 14px; font-weight: 620; fill: #454840; }
      .eyebrow { font-size: 12px; font-weight: 760; fill: #8a663a; }
      .h1 { font-size: 84px; font-weight: 500; fill: #22231f; }
      .body { font-size: 21px; fill: #5e6259; }
      .small { font-size: 13px; fill: #6b6f67; }
      .label { font-size: 12px; font-weight: 760; fill: #434840; }
      .metric { font-size: 31px; font-weight: 760; fill: #22231f; }
      .button { font-size: 15px; font-weight: 740; fill: #fffdf8; }
      .button-dark { font-size: 15px; font-weight: 740; fill: #22231f; }
    </style>
  </defs>

  <rect id="page" width="1440" height="1024" fill="url(#bg)"/>

  <g id="atmospheric-rules" opacity="0.3">
    <path d="M-50 176 C210 86 432 214 646 134 C860 54 1054 94 1490 46" fill="none" stroke="#b5bdb4" stroke-width="1"/>
    <path d="M-70 842 C230 728 520 860 762 736 C1002 612 1198 676 1510 540" fill="none" stroke="#c3bba9" stroke-width="1"/>
    <path d="M722 -80 C704 174 744 366 692 548 C642 720 704 860 656 1110" fill="none" stroke="#c8cdc4" stroke-width="1"/>
  </g>

  <g id="nav" class="sans">
    <circle cx="78" cy="68" r="16" fill="#20231f"/>
    <path d="M70 70 C77 56 86 60 90 70 C84 77 76 78 70 70 Z" fill="#fffdf8"/>
    <text x="106" y="75" class="brand">Aurelia</text>
    <text x="930" y="73" class="nav">Platform</text>
    <text x="1036" y="73" class="nav">Residences</text>
    <text x="1160" y="73" class="nav">Journal</text>
    <rect x="1260" y="46" width="118" height="44" rx="8" fill="#20231f"/>
    <text x="1288" y="73" class="button">Inquire</text>
  </g>

  <g id="hero-copy">
    <text x="96" y="204" class="eyebrow mono">PRIVATE SPATIAL INTELLIGENCE</text>
    <text x="94" y="318" class="h1 serif">Every room</text>
    <text x="94" y="405" class="h1 serif">has a tide.</text>
    <text x="94" y="516" class="h1 serif">Aurelia reads</text>
    <text x="94" y="603" class="h1 serif">its change.</text>
    <text x="100" y="674" class="body sans">A quiet intelligence layer for spaces where service,</text>
    <text x="100" y="706" class="body sans">comfort, and timing must arrive without interruption.</text>
    <rect x="100" y="762" width="174" height="56" rx="8" fill="#20231f"/>
    <text x="139" y="797" class="button sans">View the room</text>
    <rect x="292" y="762" width="156" height="56" rx="8" fill="#fffdf8" fill-opacity="0.42" stroke="#bfc7be" stroke-width="1.5"/>
    <text x="330" y="797" class="button-dark sans">Read brief</text>
  </g>

  <g id="fluid-model" filter="url(#deep-lift)">
    <path d="M590 560 C656 318 884 198 1110 274 C1290 334 1344 514 1238 672 C1110 862 812 820 666 690 C600 632 570 606 590 560 Z" fill="url(#veil)"/>
    <path d="M674 458 C786 352 942 294 1100 346 C1226 388 1270 506 1212 612 C1126 770 858 754 718 630 C654 574 640 508 674 458 Z" fill="#fffdf8" fill-opacity="0.58" stroke="#d7d0c3" stroke-width="1.6"/>
    <path d="M682 584 C774 490 878 570 986 480 C1086 396 1172 392 1250 456" fill="none" stroke="#e7eee9" stroke-width="44" stroke-linecap="round" opacity="0.82"/>
    <path d="M682 584 C774 490 878 570 986 480 C1086 396 1172 392 1250 456" fill="none" stroke="url(#signal)" stroke-width="12" stroke-linecap="round"/>
    <path d="M712 674 C838 592 930 652 1058 594 C1146 554 1198 526 1256 558" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 16"/>

    <g id="room-contours" opacity="0.54">
      <path d="M718 532 C846 494 984 450 1198 422" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
      <path d="M714 588 C850 550 1008 522 1220 504" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
      <path d="M786 648 C900 606 1020 590 1158 564" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
      <path d="M808 454 C838 542 854 614 866 692" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
      <path d="M958 408 C986 514 1002 610 1012 716" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
      <path d="M1122 402 C1112 502 1108 580 1096 654" fill="none" stroke="#9da7a0" stroke-width="1.2"/>
    </g>

    <g id="nodes" class="sans">
      <circle cx="682" cy="584" r="34" fill="#fffdf8" stroke="#244e62" stroke-width="3"/>
      <text x="662" y="589" class="label">Entry</text>
      <circle cx="986" cy="480" r="43" fill="#fffdf8" stroke="#b99459" stroke-width="3"/>
      <text x="960" y="475" class="label">Salon</text>
      <text x="962" y="497" class="small">+21%</text>
      <circle cx="1250" cy="456" r="35" fill="#fffdf8" stroke="#1f6d64" stroke-width="3"/>
      <text x="1228" y="461" class="label">Host</text>
      <circle cx="1256" cy="558" r="30" fill="#fffdf8" stroke="#b99459" stroke-width="3"/>
      <text x="1241" y="563" class="label">Bar</text>
    </g>
  </g>

  <g id="annotations" class="sans">
    <path d="M938 288 H1114 L1166 430" fill="none" stroke="#20231f" stroke-width="1.4"/>
    <rect x="790" y="252" width="238" height="66" rx="8" fill="#fffdf8" stroke="#d9dfd8" filter="url(#label-lift)"/>
    <text x="812" y="278" class="label">Atmosphere current</text>
    <text x="812" y="302" class="small">Density and tempo move together.</text>

    <path d="M1050 760 H1212 L1254 586" fill="none" stroke="#20231f" stroke-width="1.4"/>
    <rect x="1032" y="756" width="260" height="66" rx="8" fill="#fffdf8" stroke="#d9dfd8" filter="url(#label-lift)"/>
    <text x="1054" y="782" class="label">Unseen service cue</text>
    <text x="1054" y="806" class="small">Open west salon before the queue appears.</text>
  </g>

  <g id="proof" class="sans">
    <rect x="96" y="872" width="1248" height="1" fill="#bdc5bc"/>
    <text x="100" y="926" class="metric">42%</text>
    <text x="100" y="954" class="small">faster guest recovery</text>
    <text x="324" y="926" class="metric">11 min</text>
    <text x="324" y="954" class="small">earlier service signal</text>
    <text x="574" y="926" class="metric">0 cameras</text>
    <text x="574" y="954" class="small">identity-free by design</text>
    <text x="1010" y="926" class="small">For homes, clubs, and hotels where attention</text>
    <text x="1010" y="954" class="small">must feel invisible, precise, and calmly timed.</text>
  </g>
</svg>
